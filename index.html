<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simplify Suite - Signature Generator V3 (Mobile & Dark Mode Optimized)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        deep: '#1A0A2E',
                        lime: '#6BC910',
                        purple_brand: '#5B2FE6',
                    },
                    fontFamily: {
                        montserrat: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f3f4f6; color: #1A0A2E; }
        .input-field {
            width: 100%;
            background-color: white;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            color: #1A0A2E;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.2s;
        }
        .input-field:focus {
            outline: none;
            border-color: #5B2FE6;
        }
        label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #6b7280;
            margin-bottom: 0.35rem;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body class="font-montserrat min-h-screen flex items-center justify-center p-4 md:p-10">

    <div class="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-12 gap-10">
        
        <!-- Left: Form Controls -->
        <div class="lg:col-span-4 space-y-8 bg-white p-8 rounded-2xl shadow-sm border border-gray-200">
            <div>
                <h1 class="text-2xl font-black text-deep">Simplify<span class="text-lime">.</span></h1>
                <p class="text-gray-400 text-xs font-bold uppercase tracking-widest mt-1">Dark Mode Optimized Sig</p>
            </div>

            <div class="space-y-5">
                <div>
                    <label>Full Name</label>
                    <input type="text" id="name" class="input-field" value="Evarest Roofthooft" oninput="updateSignature()">
                </div>
                <div>
                    <label>Job Title</label>
                    <input type="text" id="role" class="input-field" value="Co-Founder & CEO" oninput="updateSignature()">
                </div>
                <div>
                    <label>Email Address</label>
                    <input type="email" id="email" class="input-field" value="evarest@simplify.io" oninput="updateSignature()">
                </div>
                <div>
                    <label>Phone Number</label>
                    <input type="text" id="phone" class="input-field" value="+1 234 567 8901" oninput="updateSignature()">
                </div>
                <div>
                    <label>Website URL</label>
                    <input type="text" id="website" class="input-field" value="simplifysuite.io" oninput="updateSignature()">
                </div>
            </div>

            <div class="pt-4">
                <button onclick="copySignature()" class="w-full bg-deep text-white font-bold py-4 px-6 rounded-xl hover:opacity-90 transition-all flex items-center justify-center gap-3 shadow-lg shadow-purple-900/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-lime" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                    </svg>
                    Copy Signature
                </button>
                <div id="toast" class="text-center mt-3 text-lime font-bold text-sm opacity-0 transition-opacity">Copied!</div>
            </div>
        </div>

        <!-- Right: Real-time Preview -->
        <div class="lg:col-span-8 flex flex-col">
            <div class="mb-4 flex items-center justify-between">
                <span class="text-[10px] font-black text-gray-400 uppercase tracking-[4px]">Preview Canvas</span>
                <span class="text-[10px] font-black text-gray-300 uppercase tracking-[2px]">600px Width Standard</span>
            </div>
            
            <div class="bg-gray-200 border border-dashed border-gray-300 rounded-2xl p-6 md:p-12 flex items-center justify-center min-h-[400px] shadow-inner relative overflow-hidden">
                <div id="signature-preview" class="shadow-2xl">
                    <!-- Signature Table will be injected here -->
                </div>
            </div>

            <div class="mt-8">
                <div class="bg-deep p-5 rounded-xl border border-white/5 w-full">
                    <p class="text-[10px] text-lime font-black uppercase tracking-widest mb-2">How to install</p>
                    <p class="text-xs text-white/50 leading-relaxed">Click copy, go to your email settings, and paste directly into the signature box. The formatting is optimized for Gmail and Outlook.</p>
                </div>
            </div>
        </div>

    </div>

    <script>
        function updateSignature() {
            const name = document.getElementById('name').value || 'Name';
            const role = document.getElementById('role').value || 'Title';
            const email = document.getElementById('email').value || 'name@simplify.io';
            const phone = document.getElementById('phone').value || '+1 234 567 8901';
            const website = document.getElementById('website').value || 'simplifysuite.io';

            const signatureHTML = `
<table cellpadding="0" cellspacing="0" border="0" style="width: 600px; font-family: Arial, Helvetica, sans-serif; border-collapse: collapse; background-color: #1A0A2E;">
    <tbody>
        <!-- Gradient Top Border -->
        <tr>
            <td height="3" style="background: linear-gradient(90deg, #5B2FE6 0%, #7B2FBE 50%, #6BC910 100%); font-size: 0; line-height: 0;">&nbsp;</td>
        </tr>
        
        <!-- Main Content Area -->
        <tr>
            <td style="padding: 0; background: #1A0A2E;">
                <table cellpadding="0" cellspacing="0" border="0" style="width: 100%;">
                    <tbody>
                        <tr>
                            <!-- Official Logo -->
                            <td style="padding: 24px 0 24px 24px; border-right: 1px solid rgba(255,255,255,0.08); width: 170px; vertical-align: middle; text-align: center;">
                                <img src="https://simplifysuite.io/images/simplify-logo.webp" alt="Simplify" width="130" style="display: block; margin: 0 auto; width: 130px; height: auto;">
                            </td>
                            
                            <!-- Info Cell -->
                            <td style="padding: 24px 24px; vertical-align: middle;">
                                <table cellpadding="0" cellspacing="0" border="0" style="width: 100%;">
                                    <tbody>
                                        <tr>
                                            <td style="font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700; color: #ffffff; padding-bottom: 2px; line-height: 1.2;">${name}</td>
                                        </tr>
                                        <tr>
                                            <td style="font-family: Arial, Helvetica, sans-serif; font-size: 10px; font-weight: 700; color: #6BC910; letter-spacing: 1.5px; text-transform: uppercase; padding-bottom: 12px;">${role}</td>
                                        </tr>
                                        <tr>
                                            <td height="1" style="background: rgba(255,255,255,0.1); font-size: 0; line-height: 0; padding-bottom: 12px;">&nbsp;</td>
                                        </tr>
                                        <tr>
                                            <td style="padding-bottom: 10px;">
                                                <span style="font-family: Arial, Helvetica, sans-serif; font-size: 11px; color: #A8A2B5; margin-right: 14px; white-space: nowrap;">
                                                    <span style="display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #6BC910; vertical-align: middle; margin-right: 6px;"></span>${email}
                                                </span>
                                                <a href="https://${website}" style="font-family: Arial, Helvetica, sans-serif; font-size: 11px; color: #ffffff; text-decoration: none; margin-right: 14px; white-space: nowrap;">
                                                    <span style="display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #6BC910; vertical-align: middle; margin-right: 6px;"></span>${website}
                                                </a>
                                                <span style="font-family: Arial, Helvetica, sans-serif; font-size: 11px; color: #A8A2B5; white-space: nowrap;">
                                                    <span style="display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #6BC910; vertical-align: middle; margin-right: 6px;"></span>${phone}
                                                </span>
                                            </td>
                                        </tr>
                                        <tr>
                                            <td style="font-family: Arial, Helvetica, sans-serif; font-size: 10px; color: rgba(255,255,255,0.4);">The all-in-one platform for your small business.</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </td>
        </tr>
        
        <!-- Fixed Footer Area (Single Cell for Mobile Stability) -->
        <tr>
            <td style="background: rgba(0,0,0,0.2); padding: 12px 24px; text-align: left;">
                <table cellpadding="0" cellspacing="0" border="0" style="width: 100%;">
                    <tr>
                        <td style="font-family: Arial, Helvetica, sans-serif; font-size: 9px; color: rgba(255,255,255,0.3); letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700; line-height: 1;">
                            LESS SOFTWARE, MORE BUSINESS 
                            <span style="color: rgba(255,255,255,0.1); margin: 0 10px;">|</span>
                            <a href="https://${website}" style="color: #6BC910; text-decoration: none; font-weight: 700; letter-spacing: 1.2px;">${website.toUpperCase()}</a>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </tbody>
</table>
            `;

            document.getElementById('signature-preview').innerHTML = signatureHTML.trim();
        }

        function copySignature() {
            const previewDiv = document.getElementById('signature-preview');
            const selection = window.getSelection();
            const range = document.createRange();
            range.selectNodeContents(previewDiv);
            selection.removeAllRanges();
            selection.addRange(range);
            try {
                document.execCommand('copy');
                const toast = document.getElementById('toast');
                toast.style.opacity = '1';
                setTimeout(() => { toast.style.opacity = '0'; }, 2000);
            } catch (err) { console.error(err); }
            selection.removeAllRanges();
        }

        updateSignature();
    </script>
</body>
</html>
