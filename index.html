<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simplify — Signature Generator</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap');
body { font-family: 'Montserrat', sans-serif; }
</style>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen p-6">

<div class="max-w-6xl mx-auto grid lg:grid-cols-2 gap-8">

<!-- INPUT PANEL -->
<div class="bg-white p-6 rounded-xl border space-y-4">

<input id="input-name" class="w-full border p-2 rounded" placeholder="Full Name">
<input id="input-title" class="w-full border p-2 rounded" placeholder="Job Title">
<input id="input-email" class="w-full border p-2 rounded" placeholder="Email">
<input id="input-phone" class="w-full border p-2 rounded" placeholder="Phone">

<div>
<label class="text-xs font-bold text-slate-400">Upload Profile Image</label>
<input type="file" id="upload-image" accept="image/*" class="w-full border p-2 rounded">
</div>

<input id="input-imageUrl" class="w-full border p-2 rounded" placeholder="(Optional) Image URL">

<input id="input-bookingText" class="w-full border p-2 rounded" placeholder="Button Text">
<input id="input-bookingLink" class="w-full border p-2 rounded" placeholder="Booking Link">

<button id="copy-btn" class="w-full bg-purple-600 text-white py-3 rounded">
Copy Signature
</button>

</div>

<!-- PREVIEW -->
<div class="bg-white p-6 rounded-xl border">

<table id="signature-preview" cellpadding="0" cellspacing="0"
style="width:520px; border-top:4px solid #6332f1; font-family:Arial, sans-serif;">

<tr>
<td style="padding:24px;">

<table width="100%">
<tr>

<!-- IMAGE -->
<td style="width:90px; min-width:90px; max-width:90px; vertical-align:top;">
    
    <table cellpadding="0" cellspacing="0" border="0" style="width:90px; height:90px;">
        <tr>
            <td style="width:90px; height:90px; border-radius:50%; overflow:hidden;">
                
                <img id="preview-imageUrl"
                width="90" height="90"
                style="display:block; width:90px; height:90px; min-width:90px; min-height:90px; object-fit:cover; border-radius:50%;">

            </td>
        </tr>
    </table>

</td>
<!-- SPACING -->
<td style="width:24px;"></td>

<!-- TEXT -->
<td style="vertical-align:top;">
<div id="preview-name" style="font-size:18px; font-weight:800; color:#0a0a2e;"></div>
<div id="preview-title" style="color:#6332f1; font-size:12px; margin-bottom:8px;"></div>
<div id="preview-email" style="font-size:13px; color:#555;"></div>
<div id="preview-phone" style="font-size:13px; color:#555;"></div>
</td>

<!-- RIGHT SIDE -->
<td style="text-align:right; vertical-align:top; width:150px;">

<!-- LOGO (LOCKED) -->
<img src="simplify-logo.png"
width="120"
style="display:block; margin-left:auto; margin-bottom:12px;">

<!-- CTA -->
<a id="preview-booking-btn"
href="#"
style="display:inline-block;
background:#7cc124;
color:#ffffff;
padding:10px 18px;
font-size:11px;
font-weight:700;
text-decoration:none;
border-radius:6px;
letter-spacing:0.5px;">
BOOK A CALL
</a>

</td>

</tr>
</table>

</td>
</tr>

<!-- FOOTER -->
<tr>
<td style="background:#1a0b2e; padding:12px 24px; font-size:10px; font-weight:600;">

<table width="100%">
<tr>

<td style="color:#ffffff;">
Less Software More Business
</td>

<td style="text-align:right; color:#7cc124;">
simplifysuite.io
</td>

</tr>
</table>

</td>
</tr>

</table>

</div>
</div>

<script>
const fields = ["name","title","email","phone","imageUrl","bookingText","bookingLink"];

let base64Image = "";

// UPDATE PREVIEW
function updatePreview() {
    const data = {};
    fields.forEach(f => {
        const el = document.getElementById("input-" + f);
        data[f] = el ? el.value : "";
    });

    document.getElementById("preview-name").textContent = data.name;
    document.getElementById("preview-title").textContent = data.title;
    document.getElementById("preview-email").textContent = data.email;
    document.getElementById("preview-phone").textContent = data.phone;

    const img = document.getElementById("preview-imageUrl");

    if (data.imageUrl) {
        base64Image = "";
        img.src = data.imageUrl;
    } else if (base64Image) {
        img.src = base64Image;
    }

    const btn = document.getElementById("preview-booking-btn");
    btn.href = data.bookingLink || "#";
    btn.textContent = data.bookingText || "BOOK A CALL";
}

// INPUT LISTENERS
fields.forEach(f => {
    const el = document.getElementById("input-" + f);
    if (el) el.addEventListener("input", updatePreview);
});

// IMAGE UPLOAD → BASE64
document.getElementById("upload-image").addEventListener("change", function(e){
    const file = e.target.files[0];
    if (!file) return;

    const img = new Image();
    const reader = new FileReader();

    reader.onload = function(event) {
        img.src = event.target.result;
    };

    img.onload = function() {
        const canvas = document.createElement("canvas");
        const MAX_SIZE = 120; // 🔥 key: keep small for email

        let width = img.width;
        let height = img.height;

        if (width > height) {
            if (width > MAX_SIZE) {
                height *= MAX_SIZE / width;
                width = MAX_SIZE;
            }
        } else {
            if (height > MAX_SIZE) {
                width *= MAX_SIZE / height;
                height = MAX_SIZE;
            }
        }

        canvas.width = width;
        canvas.height = height;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);

        // 🔥 compress quality (0.6 is sweet spot)
        base64Image = canvas.toDataURL("image/jpeg", 0.6);

        document.getElementById("preview-imageUrl").src = base64Image;
    };

    reader.readAsDataURL(file);
});  
// COPY
document.getElementById("copy-btn").addEventListener("click", function () {

    const sig = document.getElementById("signature-preview");
    const range = document.createRange();
    range.selectNode(sig);

    const selection = window.getSelection();
    selection.removeAllRanges();
    selection.addRange(range);

    try {
        document.execCommand("copy");
        alert("Copied! Paste into Gmail signature ✅");
    } catch (e) {
        alert("Copy failed");
    }

    selection.removeAllRanges();
});

// INIT
updatePreview();
</script>

</body>
</html>
